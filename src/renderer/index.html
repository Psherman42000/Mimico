<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimico</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main Overlay -->
  <div id="overlay">
    <div id="titlebar">
      <span id="status-indicator" class="status-dot"></span>
      <span id="title-text">Mimico</span>
      <button id="btn-close" class="title-btn">×</button>
    </div>

    <div id="content">
      <!-- Listening mode indicator -->
      <div id="listening-mode" class="mode-indicator">
        <span class="mode-dot green"></span>
        <span>Escutando...</span>
      </div>

      <!-- Transcription display -->
      <div id="transcription-area">
        <div id="original-text" class="text-line">
          <span class="lang-label">🇺🇸 EN</span>
          <span id="original-content" class="text-content">—</span>
        </div>
        <div id="translated-text" class="text-line">
          <span class="lang-label">🇧🇷 PT</span>
          <span id="translated-content" class="text-content">—</span>
        </div>
      </div>

      <!-- Latency bar (debug mode) -->
      <div id="latency-bar" class="hidden">
        <span id="latency-ms">0ms</span>
      </div>
    </div>

    <!-- Bottom bar with toggle -->
    <div id="bottombar">
      <button id="btn-tts" class="toggle-btn inactive" title="Voz Clonada">
        🎤 <span id="tts-label">Voz: OFF</span>
      </button>
      <button id="btn-settings" class="icon-btn" title="Configurações">⚙️</button>
    </div>
  </div>

  <!-- Settings Panel (hidden by default) -->
  <div id="settings-panel" class="hidden">
    <div id="settings-header">
      <h2>Configurações</h2>
      <button id="btn-close-settings" class="title-btn">×</button>
    </div>
    <div id="settings-body">
      <div class="setting-group">
        <label>DeepL API Key</label>
        <input type="password" id="input-deepl-key" placeholder="Insira sua chave DeepL" />
      </div>
      <div class="setting-group">
        <label>Modo TTS</label>
        <select id="select-tts-mode">
          <option value="local">Local (OpenVoice) — $0</option>
          <option value="api">API (nuvem)</option>
        </select>
      </div>
      <div class="setting-group" id="provider-group" style="display:none">
        <label>Provider TTS</label>
        <select id="select-tts-provider">
          <option value="cartesia">Cartesia ($4/mês)</option>
          <option value="fish">Fish.audio ($11/mês)</option>
          <option value="openai">OpenAI TTS (pay-per-use)</option>
        </select>
      </div>
      <div class="setting-group" id="api-key-group" style="display:none">
        <label>API Key do Provider</label>
        <input type="password" id="input-tts-key" placeholder="API Key" />
      </div>
      <div class="setting-group">
        <label>Hotkey global</label>
        <input type="text" id="input-hotkey" value="Ctrl+Shift+M" />
      </div>
      <div class="setting-group">
        <label>Opacidade</label>
        <input type="range" id="input-opacity" min="0.3" max="1" step="0.05" value="0.85" />
      </div>
      <div class="setting-group">
        <label>Gravar voz para clonagem</label>
        <button id="btn-record-voice" class="action-btn">🎤 Gravar</button>
      </div>
      <div class="setting-group">
        <label>Testar latência</label>
        <button id="btn-test-latency" class="action-btn">⏱️ Testar</button>
      </div>
      <button id="btn-save-settings" class="save-btn">💾 Salvar Configurações</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
