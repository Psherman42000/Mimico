<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimico Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: rgba(8,9,10,.82);
    --border: rgba(255,255,255,.06);
    --text: #f7f8f8;
    --text-secondary: #d0d6e0;
    --text-dim: #8a8f98;
    --accent: #5e6ad2;
    --green: #10b981;
    --radius: 8px;
  }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-feature-settings: 'cv01', 'ss03';
    -webkit-font-smoothing: antialiased;
    user-select: none;
    background: transparent;
  }
  /* ── Container ── */
  .overlay {
    width: 100vw; height: 100vh;
    padding: 10px 14px;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    background: transparent;
  }
  /* ── Card ── */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    max-width: 480px;
    min-width: 200px;
    width: fit-content;
    max-width: 85vw;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: opacity .35s ease, transform .35s ease;
    opacity: 1;
    transform: translateY(0);
  }
  .card.hidden {
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
  }
  /* ── Status bar ── */
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .status .dot {
    width: 5px; height: 5px; border-radius: 50%;
    display: inline-block;
  }
  .status .dot.green { background: var(--green); }
  .status .mode {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim);
  }
  .status .mode.on { color: var(--green); }
  .status .spacer { flex: 1; }
  .status .tts-indicator {
    font-size: 10px; color: var(--text-dim);
  }
  .status .tts-indicator.active { color: var(--green); }
  /* ── Text ── */
  .text-en {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 2px;
    word-wrap: break-word;
  }
  .text-pt {
    font-size: 17px; font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    word-wrap: break-word;
  }
  .placeholder {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 14px;
  }
  .placeholder-en { color: var(--text-dim); font-size: 12px; }
  /* ── Transitions ── */
  .fade-enter { opacity: 0; transform: translateY(8px); }
  .fade-enter-active { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="overlay">
  <div class="card" id="card">
    <div class="status">
      <span class="dot green" id="statusDot"></span>
      <span class="mode on" id="modeLabel">LEGENDAS</span>
      <span class="spacer"></span>
      <span class="tts-indicator" id="ttsIndicator">🎤 OFF</span>
    </div>
    <div class="text-en placeholder-en" id="textEn">🎧 Aguardando áudio...</div>
    <div class="text-pt placeholder" id="textPt">Tradução aparecerá aqui</div>
  </div>
</div>

<script>
  const card = document.getElementById('card');
  const textEn = document.getElementById('textEn');
  const textPt = document.getElementById('textPt');
  const modeLabel = document.getElementById('modeLabel');
  const ttsIndicator = document.getElementById('ttsIndicator');
  const statusDot = document.getElementById('statusDot');
  let fadeTimer = null;

  // ── Demo: simulate translations ──
  const demos = [
    { en: "What time is the meeting tomorrow?", pt: "Que horas é a reunião amanhã?" },
    { en: "I agree, but we should check the numbers first", pt: "Concordo, mas devemos verificar os números primeiro" },
    { en: "The deadline is next Friday, June 19", pt: "O prazo é sexta-feira, 19 de junho" },
  ];
  let i = 0;
  function showNext() {
    const d = demos[i % demos.length];
    textEn.textContent = d.en;
    textPt.textContent = d.pt;
    textEn.classList.remove('placeholder-en');
    textPt.classList.remove('placeholder');
    card.classList.remove('hidden');
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => card.classList.add('hidden'), 4000);
    i++;
  }
  showNext();
  setInterval(showNext, 5000);

  // ── IPC API (for Electron) ──
  if (window.mimicoAPI) {
    window.mimicoAPI.onTranslation((data) => {
      textEn.textContent = data.en;
      textPt.textContent = data.pt;
      card.classList.remove('hidden');
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => card.classList.add('hidden'), 3000);
    });
  }
</script>
</body>
</html>
